services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentmem
      POSTGRES_USER: agentmem
      POSTGRES_PASSWORD: ${AGENT_MEM_PG_PASSWORD:-agentmem}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmem"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agentmem:${AGENT_MEM_PG_PASSWORD:-agentmem}@postgres:5432/agentmem
    ports:
      - "34567:34567"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"

volumes:
  pgdata:
